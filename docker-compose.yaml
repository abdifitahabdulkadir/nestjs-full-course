services:
  postgres:
    image: postgres:latest
    container_name: nest-container
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: nest-db
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib

  redis:
    image: redis:alpine
    container_name: nest-redis
    command: redis-server --requirepass admin
    ports:
      - 6379:6379

volumes:
  postgres_data:
